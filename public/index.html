<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Assistant Dashboard</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f4f4f5; padding: 2rem; max-width: 800px; margin: 0 auto; color: #333; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        input[type="text"] { width: 70%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; margin-right: 10px; }
        button { padding: 0.75rem 1.5rem; background: #10a37f; color: #fff; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; }
        button:hover { background: #0d8a6b; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        td, th { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #fafafa; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">🚀 My AI Command Center</h1>

    <div class="card">
        <h2>➕ Add New Task</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="newTaskInput" placeholder="Pay the electric bill..." style="flex: 2;">
            <input type="datetime-local" id="deadlineInput" style="flex: 1; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px;">
        </div>
        <button onclick="createTask()">Save Task</button>
    </div>

    <div class="card">
        <h2>📊 Active Tasks & Data</h2>
        <div id="sheetContent">Loading data...</div>
    </div>

    <div class="card">
        <h2>🤖 Ask your Assistant</h2>
        <input type="text" id="aiInput" placeholder="Analyze my workload...">
        <button onclick="askAI()">Ask AI</button>
        <p id="aiResponse" style="margin-top: 1rem; line-height: 1.5;"></p>
    </div>

    <script>
        async function fetchSheetData() {
            const response = await fetch('/api?action=getSheetData');
            const data = await response.json();
            
            if (data.length === 0) {
                document.getElementById('sheetContent').innerHTML = "<p>No data found.</p>";
                return;
            }

            let html = '<table>';
            data.forEach((row, index) => {
                html += '<tr>';
                row.forEach(cell => {
                    html += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                });
                html += '</tr>';
            });
            html += '</table>';
            document.getElementById('sheetContent').innerHTML = html;
        }

       async function createTask() {
            const taskInput = document.getElementById('newTaskInput');
            const deadlineInput = document.getElementById('deadlineInput');
            
            const taskText = taskInput.value;
            // Format the deadline nicely if the user selected one
            const deadlineDate = deadlineInput.value ? new Date(deadlineInput.value).toLocaleString() : "-";
            
            if (!taskText) return;

            taskInput.value = 'Saving...';
            taskInput.disabled = true;

            await fetch('/api?action=createTask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task: taskText, deadline: deadlineDate })
            });

            taskInput.value = '';
            deadlineInput.value = '';
            taskInput.disabled = false;
            fetchSheetData(); // Refresh table
        }

        async function askAI() {
            const question = document.getElementById('aiInput').value;
            if (!question) return;
            
            const responseText = document.getElementById('aiResponse');
            responseText.innerHTML = "<em>Analyzing...</em>";

            const response = await fetch('/api?action=askAI', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            
            const data = await response.json();
            responseText.innerHTML = `<strong>Assistant:</strong> ${data.answer}`;
        }

        // Run on load
        fetchSheetData();
    </script>
</body>
</html>
